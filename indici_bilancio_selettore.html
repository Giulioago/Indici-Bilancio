
<style>
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{background:#0a0a0a;border-radius:12px;padding:20px}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.pill{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .18s;background:#111;color:#7aa8c8;border-color:#1e3a52}
.pill.on{color:#fff}
.pill .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.section-label{font-size:11px;font-weight:500;color:#4a7a9b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
</style>

<h2 class="sr-only">Grafico interattivo indici di bilancio con selezione singola per indice</h2>

<div style="padding:1rem 0">

  <div class="pill-row" id="pills"></div>

  <div class="wrap" style="margin-bottom:1.5rem">
    <div class="section-label">Confronto per anno</div>
    <div style="position:relative;width:100%;height:300px">
      <canvas id="barChart" role="img" aria-label="Istogramma raggruppato indici selezionati per anni 2021 2023 2024">Istogramma indici di bilancio.</canvas>
    </div>
  </div>

  <div class="wrap">
    <div class="section-label">Andamento nel tempo</div>
    <div style="position:relative;width:100%;height:240px">
      <canvas id="lineChart" role="img" aria-label="Grafico a linee andamento indici selezionati">Andamento temporale.</canvas>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const INDICI = {
  ROE:   { valori:[23.11,13.83, 6.90], colore:'#7F77DD' },
  ROA:   { valori:[ 8.46, 6.39, 3.30], colore:'#1D9E75' },
  r:     { valori:[ 0.20,-0.45,-0.10], colore:'#D85A30' },
  'MT/E':{ valori:[ 3.05, 2.31, 2.71], colore:'#3fa8d8' },
};
const ANNI = ['2021','2023','2024'];
let active = new Set(Object.keys(INDICI));
let bChart, lChart;

function hex2rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

const axisStyle={ticks:{color:'#7aa8c8',font:{size:11}},grid:{color:'rgba(255,255,255,0.06)'},border:{color:'rgba(255,255,255,0.1)'}};
const ttStyle={backgroundColor:'#0d1f30',titleColor:'#85B7EB',bodyColor:'#c8e4f4',borderColor:'#378ADD',borderWidth:0.5,padding:10};

function buildPills(){
  const row=document.getElementById('pills');
  row.innerHTML='';
  Object.keys(INDICI).forEach(nome=>{
    const col=INDICI[nome].colore;
    const on=active.has(nome);
    const p=document.createElement('button');
    p.className='pill'+(on?' on':'');
    p.style.borderColor=on?col:'#1e3a52';
    p.style.background=on?hex2rgba(col,0.18):'#111';
    p.innerHTML=`<span class="dot" style="background:${on?col:'#2a4a6b'}"></span>${nome}`;
    p.onclick=()=>{
      if(active.has(nome)){if(active.size<=1)return;active.delete(nome);}
      else active.add(nome);
      buildPills();buildBarChart();buildLineChart();
    };
    row.appendChild(p);
  });
}

function vis(){return Object.keys(INDICI).filter(k=>active.has(k));}

function buildBarChart(){
  const keys=vis();
  const datasets=keys.map(nome=>({
    label:nome,
    data:INDICI[nome].valori,
    backgroundColor:hex2rgba(INDICI[nome].colore,0.82),
    borderColor:INDICI[nome].colore,
    borderWidth:1,borderRadius:4,borderSkipped:false,
  }));
  if(bChart)bChart.destroy();
  bChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:ANNI,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:350,easing:'easeInOutQuart'},
      plugins:{legend:{display:false},tooltip:{...ttStyle,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(2)}`}}},
      scales:{
        x:{...axisStyle,ticks:{...axisStyle.ticks,font:{size:12},autoSkip:false}},
        y:{...axisStyle,ticks:{...axisStyle.ticks,callback:v=>v.toFixed(1)}}
      }
    }
  });
}

function buildLineChart(){
  const keys=vis();
  const datasets=keys.map((nome,i)=>({
    label:nome,
    data:INDICI[nome].valori,
    borderColor:INDICI[nome].colore,
    pointBackgroundColor:INDICI[nome].colore,
    pointRadius:5,pointHoverRadius:8,
    tension:0.35,fill:false,borderWidth:2,
    borderDash:i%2===1?[5,3]:[],
  }));
  if(lChart)lChart.destroy();
  lChart=new Chart(document.getElementById('lineChart'),{
    type:'line',
    data:{labels:ANNI,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:350,easing:'easeInOutQuart'},
      plugins:{legend:{display:false},tooltip:{...ttStyle,mode:'index',intersect:false,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(2)}`}}},
      scales:{
        x:{...axisStyle,ticks:{...axisStyle.ticks,font:{size:12},autoSkip:false}},
        y:{...axisStyle,ticks:{...axisStyle.ticks,callback:v=>v.toFixed(1)}}
      }
    }
  });
}

buildPills();buildBarChart();buildLineChart();
</script>
